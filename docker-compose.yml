services:
  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastfood
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastfood"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build: .
    command: bun run product-service
    expose:
      - "3002"
    restart: on-failure

  order-service:
    build: .
    command: bun run order-service
    environment:
      AMQP_URL: amqp://rabbitmq
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastfood
    expose:
      - "3001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  kitchen-service:
    build: .
    command: bun run kitchen-service
    environment:
      AMQP_URL: amqp://rabbitmq
      PORT: "3003"
    expose:
      - "3003"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: .
    command: bun run notification-service
    environment:
      AMQP_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: nginx:alpine
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product-service
      - order-service
      - kitchen-service
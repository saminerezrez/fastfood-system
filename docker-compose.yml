services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastfood
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastfood"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build: .
    command: bun run product-service
    ports:
      - "3002:3002"

  order-service:
    build: .
    command: bun run order-service
    environment:
      AMQP_URL: amqp://rabbitmq
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastfood
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  kitchen-service:
    build: .
    command: bun run kitchen-service
    environment:
      AMQP_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: .
    command: bun run notification-service
    environment:
      AMQP_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product-service
      - order-service